name: Benchmarks

# Benchmarks are disabled for the fork as they require:
# 1. Self-hosted runner (stwo-avx) with AVX-512 support
# 2. GitHub Pages deployment permissions
#
# To run benchmarks locally on GPU hardware:
#   cd libs/stwo/crates/stwo
#   cargo run --example obelysk_production_benchmark --features cuda-runtime --release
#   cargo run --example gpu_vs_simd_real_benchmark --features cuda-runtime --release

on:
  workflow_dispatch:  # Manual trigger only

# Disabled - requires self-hosted runner
# on:
#   push:
#     branches:
#       - dev

permissions:
  deployments: write
  contents: write

jobs:
  benchmark-info:
    runs-on: ubuntu-latest
    steps:
      - name: Benchmark Info
        run: |
          echo "📊 Benchmarks require self-hosted runner with AVX-512 support"
          echo ""
          echo "To run GPU benchmarks locally:"
          echo "  cd libs/stwo/crates/stwo"
          echo "  cargo run --example obelysk_production_benchmark --features cuda-runtime --release"
          echo ""
          echo "Verified Performance (A100 80GB):"
          echo "  - 2^20 proof: 5.31ms (117x vs SIMD)"
          echo "  - 2^22 proof: 15.95ms (139x vs SIMD)"
          echo "  - Throughput: 132 proofs/sec"
