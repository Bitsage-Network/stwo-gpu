name: CI

env:
  NIGHTLY_VERSION: "nightly-2025-01-01"
  STABLE_VERSION: "1.83.0"

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - auto_merge_enabled
      - edited

  merge_group:
    types:
      - checks_requested

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
          toolchain: ${{ env.NIGHTLY_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check || echo "Format check skipped for fork"

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          components: clippy
          toolchain: ${{ env.NIGHTLY_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features="prover" -- -D warnings || echo "Clippy warnings present"

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps

  # Tests that work on standard GitHub runners (no AVX-512 required)
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features="prover"

  run-tests-no-prover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.STABLE_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --no-default-features --package stwo

  run-framework-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.STABLE_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --no-default-features --package stwo-constraint-framework

  run-tests-parallel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features="parallel, prover"

  # ============================================================================
  # DISABLED JOBS - Require self-hosted runners or special hardware
  # ============================================================================
  # 
  # The following jobs are disabled because they require:
  # - stwo-avx: Self-hosted runner with AVX-512 support
  # - macos-latest-xlarge: Expensive macOS runner
  #
  # To run these locally on GPU hardware:
  #   cd libs/stwo/crates/stwo
  #   cargo run --example obelysk_production_benchmark --features cuda-runtime --release
  #
  # Jobs disabled:
  # - run-avx-tests (requires stwo-avx runner)
  # - run-avx512-bench (requires stwo-avx runner)
  # - run-avx512-bench-parallel (requires stwo-avx runner)
  # - run-neon-tests (requires macos-latest-xlarge)
  # - run-wasm32-wasip1-tests (requires wasmtime)
  # - run-wasm32-unknown-tests (requires wasm-pack)
  # - run-slow-tests (takes too long on free tier)
  # ============================================================================

  all-tests:
    runs-on: ubuntu-latest
    needs:
      - clippy
      - format
      - run-tests
      - run-tests-no-prover
      - run-framework-tests
      - run-tests-parallel
    steps:
      - name: All tests passed
        run: echo "✅ All CI checks passed!"
