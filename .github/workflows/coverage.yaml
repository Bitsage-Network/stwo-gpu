name: Coverage

# Coverage is disabled for the fork as it requires:
# 1. Self-hosted runner (stwo-avx) with AVX-512 support
# 2. Codecov token configured
# 
# To enable coverage for your fork:
# 1. Set up a self-hosted runner with AVX-512 support
# 2. Add CODECOV_TOKEN to your repository secrets
# 3. Uncomment the workflow below

on:
  workflow_dispatch:  # Manual trigger only

# Disabled - requires self-hosted runner
# on: [pull_request, push]

jobs:
  coverage:
    runs-on: ubuntu-latest
    if: false  # Disabled
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Skip coverage
        run: echo "Coverage requires self-hosted runner with AVX-512 support"
